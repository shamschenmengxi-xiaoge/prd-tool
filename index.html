<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRD 工作台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0c10;
  --surface: #111318;
  --surface2: #161b24;
  --border: #1e2530;
  --border2: #252d3a;
  --text: #e8eaf0;
  --text2: #8b95a8;
  --text3: #4a5568;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
  --a1: #3b82f6; --a2: #8b5cf6; --a3: #10b981; --a4: #f59e0b; --a5: #ef4444;
}

body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }

.layout { display: flex; height: 100vh; }

/* SIDEBAR */
.sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

.sidebar-header { padding: 22px 18px 16px; border-bottom: 1px solid var(--border); }

.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo-icon { width: 30px; height: 30px; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.logo-text { font-family: 'Noto Serif SC', serif; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, var(--accent2), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.logo-sub { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-left: 40px; }

/* CONFIG */
.config-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.config-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.config-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.config-row:last-child { margin-bottom: 0; }

select, input[type="password"] { flex: 1; height: 32px; padding: 0 8px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-family: inherit; font-size: 12px; outline: none; transition: border-color 0.15s; }
select:focus, input[type="password"]:focus { border-color: var(--accent); }
input[type="password"] { font-family: 'JetBrains Mono', monospace; font-size: 11px; }

.status-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); transition: background 0.3s; flex-shrink: 0; }
.dot.ok { background: var(--green); }
.dot.err { background: var(--red); }
.status-text { font-size: 11px; color: var(--text3); flex: 1; }
.status-text a { color: var(--accent2); text-decoration: none; }

/* NAV */
.nav { padding: 14px 12px; flex: 1; overflow-y: auto; }
.nav-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; padding: 0 6px; margin-bottom: 8px; }

.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 8px; border-radius: 8px; cursor: pointer; transition: all 0.15s; margin-bottom: 2px; position: relative; }
.nav-item:hover { background: var(--surface2); }
.nav-item.active { background: rgba(59,130,246,0.1); }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 60%; border-radius: 0 2px 2px 0; }

.nav-item[data-step="1"].active::before { background: var(--a1); }
.nav-item[data-step="2"].active::before { background: var(--a2); }
.nav-item[data-step="3"].active::before { background: var(--a3); }
.nav-item[data-step="4"].active::before { background: var(--a4); }
.nav-item[data-step="5"].active::before { background: var(--a5); }

.nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; border: 2px solid var(--border2); transition: all 0.2s; }
.nav-item[data-step="1"].done .nav-dot, .nav-item[data-step="1"].active .nav-dot { background: var(--a1); border-color: var(--a1); }
.nav-item[data-step="2"].done .nav-dot, .nav-item[data-step="2"].active .nav-dot { background: var(--a2); border-color: var(--a2); }
.nav-item[data-step="3"].done .nav-dot, .nav-item[data-step="3"].active .nav-dot { background: var(--a3); border-color: var(--a3); }
.nav-item[data-step="4"].done .nav-dot, .nav-item[data-step="4"].active .nav-dot { background: var(--a4); border-color: var(--a4); }
.nav-item[data-step="5"].done .nav-dot, .nav-item[data-step="5"].active .nav-dot { background: var(--a5); border-color: var(--a5); }

.nav-content { flex: 1; }
.nav-num { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-bottom: 1px; }
.nav-name { font-size: 12px; color: var(--text2); line-height: 1.3; }
.nav-item.active .nav-name { color: var(--text); }
.nav-check { font-size: 11px; color: var(--green); opacity: 0; }
.nav-item.done .nav-check { opacity: 1; }

/* PIPELINE */
.pipeline-bar { padding: 12px 16px; border-top: 1px solid var(--border); }
.pipeline-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.pipeline-track { display: flex; gap: 3px; }
.p-seg { flex: 1; height: 3px; border-radius: 2px; background: var(--border2); transition: background 0.4s; cursor: pointer; }
.p-seg.done { background: var(--green); }
.p-seg.active { background: var(--accent); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar { height: 56px; padding: 0 28px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.topbar-title { font-size: 15px; font-weight: 600; }
.topbar-sub { font-size: 12px; color: var(--text3); }
.topbar-space { flex: 1; }

.content { flex: 1; overflow-y: auto; padding: 28px; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* CARD */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; }

.card-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.bar-1 { background: linear-gradient(90deg, var(--a1), transparent); }
.bar-2 { background: linear-gradient(90deg, var(--a2), transparent); }
.bar-3 { background: linear-gradient(90deg, var(--a3), transparent); }
.bar-4 { background: linear-gradient(90deg, var(--a4), transparent); }
.bar-5 { background: linear-gradient(90deg, var(--a5), transparent); }

.card-header { padding: 20px 22px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 14px; }

.agent-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; margin-top: 2px; }
.icon-1 { background: rgba(59,130,246,.12); }
.icon-2 { background: rgba(139,92,246,.12); }
.icon-3 { background: rgba(16,185,129,.12); }
.icon-4 { background: rgba(245,158,11,.12); }
.icon-5 { background: rgba(239,68,68,.12); }

.agent-tag { font-size: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 500; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
.tag-1 { background: rgba(59,130,246,.12); color: var(--a1); }
.tag-2 { background: rgba(139,92,246,.12); color: var(--a2); }
.tag-3 { background: rgba(16,185,129,.12); color: var(--a3); }
.tag-4 { background: rgba(245,158,11,.12); color: var(--a4); }
.tag-5 { background: rgba(239,68,68,.12); color: var(--a5); }

.agent-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
.agent-desc { font-size: 12px; color: var(--text2); line-height: 1.6; max-width: 560px; }

/* IO */
.io-grid { display: grid; grid-template-columns: 1fr 28px 1fr; align-items: start; padding: 16px 22px; border-bottom: 1px solid var(--border); }
.io-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.io-box-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
.io-items { list-style: none; }
.io-items li { font-size: 12px; color: var(--text2); padding: 3px 0; display: flex; align-items: baseline; gap: 6px; }
.io-items li::before { content: '·'; color: var(--text3); }
.io-arrow { display: flex; align-items: center; justify-content: center; padding-top: 36px; color: var(--text3); font-size: 18px; }

/* WORKSPACE */
.workspace { padding: 20px 22px; }
.ws-label { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 7px; display: flex; align-items: center; justify-content: space-between; }

textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 13px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; line-height: 1.7; resize: vertical; min-height: 130px; outline: none; transition: border-color 0.15s; margin-bottom: 12px; }
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--text3); }

/* BUTTONS */
.actions { display: flex; align-items: center; gap: 8px; }
button { height: 34px; padding: 0 16px; border-radius: 7px; font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
.btn-run { background: var(--accent); color: white; }
.btn-run:hover { background: #2563eb; }
.btn-run:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.btn-next { margin-left: auto; background: rgba(59,130,246,0.1); color: var(--accent2); border: 1px solid rgba(59,130,246,0.25); display: none; }
.btn-next:hover { background: rgba(59,130,246,0.18); }
.btn-next.visible { display: flex; }
.btn-verify { height: 32px; padding: 0 10px; font-size: 11px; background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: 6px; }
.btn-verify:hover { background: var(--surface2); }

/* LOADING */
.loading-row { display: none; align-items: center; gap: 9px; padding: 10px 0; color: var(--text3); font-size: 12px; }
.loading-row.visible { display: flex; }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* OUTPUT */
.output-wrap { display: none; margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
.output-wrap.visible { display: block; }
.output-header { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }
.output-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.output-label-text { font-size: 11px; font-weight: 500; color: var(--text2); flex: 1; }
.output-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-size: 13px; line-height: 1.8; color: var(--text2); max-height: 460px; overflow-y: auto; }

.output-box h2 { font-size: 13px; font-weight: 700; color: var(--text); margin: 14px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.output-box h2:first-child { margin-top: 0; }
.output-box h3 { font-size: 12px; font-weight: 600; color: var(--accent2); margin: 10px 0 5px; }
.output-box ul { list-style: none; padding: 0; margin: 4px 0; }
.output-box li { padding: 3px 0 3px 12px; position: relative; color: var(--text2); }
.output-box li::before { content: '·'; position: absolute; left: 3px; color: var(--text3); }
.output-box strong { color: var(--text); font-weight: 600; }
.output-box table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
.output-box td, .output-box th { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
.output-box th { background: var(--surface); color: var(--text2); font-weight: 600; }
.output-box hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.output-box code { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: var(--border2); padding: 1px 5px; border-radius: 3px; color: var(--accent2); }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 8px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all 0.22s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <span class="logo-text">Agentic PRD</span>
      </div>
      <div class="logo-sub">智谱 GLM 驱动</div>
    </div>

    <div class="config-section">
      <div class="config-label">模型配置</div>
      <div class="config-row">
        <select id="model">
          <option value="glm-4-flash">GLM-4-Flash（免费）</option>
          <option value="glm-4-air">GLM-4-Air</option>
          <option value="glm-4">GLM-4</option>
          <option value="glm-4-long">GLM-4-Long</option>
        </select>
      </div>
      <div class="config-row">
        <input type="password" id="apikey" placeholder="粘贴 API Key…" oninput="saveKey()" />
        <button class="btn-verify" onclick="testConn()">验证</button>
      </div>
      <div class="status-row">
        <div class="dot" id="conn-dot"></div>
        <span class="status-text" id="conn-text">未配置 · <a href="https://open.bigmodel.cn" target="_blank">免费申请 →</a></span>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-label">五步流水线</div>
      <div class="nav-item active" data-step="1" onclick="switchStep(1)">
        <div class="nav-dot"></div>
        <div class="nav-content"><div class="nav-num">AGENT 01</div><div class="nav-name">Recorder 事实整理</div></div>
        <span class="nav-check">✓</span>
      </div>
      <div class="nav-item" data-step="2" onclick="switchStep(2)">
        <div class="nav-dot"></div>
        <div class="nav-content"><div class="nav-num">AGENT 02</div><div class="nav-name">Translator 意图翻译</div></div>
        <span class="nav-check">✓</span>
      </div>
      <div class="nav-item" data-step="3" onclick="switchStep(3)">
        <div class="nav-dot"></div>
        <div class="nav-content"><div class="nav-num">AGENT 03</div><div class="nav-name">Writer PRD 写手</div></div>
        <span class="nav-check">✓</span>
      </div>
      <div class="nav-item" data-step="4" onclick="switchStep(4)">
        <div class="nav-dot"></div>
        <div class="nav-content"><div class="nav-num">AGENT 04</div><div class="nav-name">Reviewer 评审挑战</div></div>
        <span class="nav-check">✓</span>
      </div>
      <div class="nav-item" data-step="5" onclick="switchStep(5)">
        <div class="nav-dot"></div>
        <div class="nav-content"><div class="nav-num">AGENT 05</div><div class="nav-name">Generator 工单拆解</div></div>
        <span class="nav-check">✓</span>
      </div>
    </nav>

    <div class="pipeline-bar">
      <div class="pipeline-label">流水线进度</div>
      <div class="pipeline-track">
        <div class="p-seg active" id="seg-1" onclick="switchStep(1)"></div>
        <div class="p-seg" id="seg-2" onclick="switchStep(2)"></div>
        <div class="p-seg" id="seg-3" onclick="switchStep(3)"></div>
        <div class="p-seg" id="seg-4" onclick="switchStep(4)"></div>
        <div class="p-seg" id="seg-5" onclick="switchStep(5)"></div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">Agent 01 — Recorder</span>
      <span class="topbar-sub" id="topbar-sub">会议转录与事实整理员</span>
      <div class="topbar-space"></div>
      <button class="btn-ghost" style="font-size:12px" onclick="runAll()" id="run-all-btn">▶ 一键运行全流程</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const AGENTS = [
  { id:1, icon:'📼', iconClass:'icon-1', tagClass:'tag-1', barClass:'bar-1',
    tag:'AGENT 01 · Recorder', title:'事实整理员',
    desc:'只做一件事：把"发生了什么"说清楚。把散乱的会议记录整理成结构化事实，不加任何推断。',
    inputLabel:'粘贴会议记录 / 聊天记录 / 纪要',
    placeholder:'[09:05] 张三：我们先做用户分层，把沉默用户挑出来激活\n[09:07] 李四：数据怎么来？目前埋点没全跑通\n[09:09] 王五：月底前必须有初版，董事会要看\n[09:12] 张三：先用离线T+1数据，实时的Q2再说',
    inputItems:['会议录音文字','群聊 / IM 记录','飞书 / Notion 纪要'],
    outputItems:['事实清单（谁说了什么）','待确认点','决策与责任人表格'],
    nextLabel:'继续 → 意图翻译',
    system:`你是 Recorder（事实整理员）。只做一件事：把"发生了什么"说清楚。

严格按以下格式输出 Markdown，不要加自己的推断：

## ✅ 事实清单
- [姓名]：[具体说了什么 / 达成了什么]（每条必须有出处，按时间顺序）

## ❓ 待确认点
- [口头猜测或证据不足、需要进一步确认的事项]

## 👤 决策与责任人
| 决策事项 | 责任人 | 截止时间 |
|---|---|---|
| ... | ... | ... |

保持简洁，用 bullet，不要写多余的解释。`
  },
  { id:2, icon:'🔍', iconClass:'icon-2', tagClass:'tag-2', barClass:'bar-2',
    tag:'AGENT 02 · Translator', title:'意图翻译官',
    desc:'把业务话术翻译成产品语言。目标不是功能，目标是可验证的业务结果，必须有具体数字和截止时间。',
    inputLabel:'粘贴事实清单（或直接描述业务背景）',
    placeholder:'粘贴上一步的输出，或直接描述业务背景、痛点、期望结果……',
    inputItems:['Agent01 事实清单','或直接描述业务背景'],
    outputItems:['可验证目标（OKR格式）','约束条件（时间/资源/数据）','关键假设','优先级 P0/P1/P2'],
    nextLabel:'继续 → PRD 写手',
    system:`你是 Intent Translator（意图翻译官）。把业务话术翻译成产品语言。

输出前先用这五个问题审视输入（答案内化到输出中，不要逐条列出问题）：
- USER：用户是谁？（精确画像，不是"所有用户"）
- PROBLEM：问题是什么？（数据化的差距）
- WHY NOW：为什么现在必须做？
- COST：不做的代价？
- SUCCESS：成功是什么样的？（可测量+有时间范围）

如果某个问题信息不足，在"关键假设"里标出来。严格按以下格式输出：

## 🎯 可验证目标
[可量化+有截止时间的业务结果，OKR格式]

## 🚧 约束条件
- 时间约束：
- 资源约束：（人力/预算）
- 数据约束：（依赖哪些数据或系统）
- 合规约束：（如有）

## 💡 关键假设（需验证）
- [假设] → 验证方式：[如何验证] → 负责人：[谁]

## 📊 优先级建议
- P0（必做，阻塞上线）：
- P1（应做，影响目标达成）：
- P2（可延后）：

拒绝"尽快""有所提升"等模糊表述，必须有具体数字。`
  },
  { id:3, icon:'📝', iconClass:'icon-3', tagClass:'tag-3', barClass:'bar-3',
    tag:'AGENT 03 · Writer', title:'PRD 结构化写手',
    desc:'输出结构完整的 PRD 初稿。重点是结构完整，不是文笔优美。每个模块至少3个实质条目，不能只写标题。',
    inputLabel:'粘贴目标与约束（或 Agent02 的输出）',
    placeholder:'粘贴上一步的翻译结果，或直接描述产品目标、约束条件……',
    inputItems:['可验证目标','约束条件','优先级建议'],

const API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
let currentStep = 1;
const outputs = {};

window.onload = () => {
  const k = localStorage.getItem('glm_key');
  if (k) document.getElementById('apikey').value = k;
  renderStep(1);
};

function saveKey() { localStorage.setItem('glm_key', document.getElementById('apikey').value); }

async function testConn() {
  const key = document.getElementById('apikey').value.trim();
  if (!key) { toast('请先填写 API Key'); return; }
  document.getElementById('conn-text').textContent = '验证中…';
  try {
    const r = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body:JSON.stringify({model:document.getElementById('model').value,max_tokens:5,messages:[{role:'user',content:'hi'}]})
    });
    if (r.ok) {
      document.getElementById('conn-dot').className='dot ok';
      document.getElementById('conn-text').textContent='连接正常';
      toast('✓ API Key 验证通过');
    } else {
      const e=await r.json(); throw new Error(e.error?.message||r.status);
    }
  } catch(e) {
    document.getElementById('conn-dot').className='dot err';
    document.getElementById('conn-text').textContent='连接失败';
    toast('连接失败：'+e.message);
  }
}

function renderStep(n) {
  const a = AGENTS[n-1];
  const prev = outputs[n]||'';
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-bar ${a.barClass}"></div>
      <div class="card-header">
        <div class="agent-icon ${a.iconClass}">${a.icon}</div>
        <div>
          <div class="agent-tag ${a.tagClass}">${a.tag}</div>
          <div class="agent-title">${a.title}</div>
          <div class="agent-desc">${a.desc}</div>
        </div>
      </div>
      <div class="io-grid">
        <div class="io-box">
          <div class="io-box-label">输入</div>
          <ul class="io-items">${a.inputItems.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>
        <div class="io-arrow">→</div>
        <div class="io-box">
          <div class="io-box-label">输出</div>
          <ul class="io-items">${a.outputItems.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>
      </div>
      <div class="workspace">
        <div class="ws-label">
          <span>${a.inputLabel}</span>
          <button class="btn-ghost" style="height:26px;padding:0 10px;font-size:11px" onclick="loadSample(${n})">加载示例</button>
        </div>
        <textarea id="ta-${n}" placeholder="${a.placeholder}">${n>1&&!prev?(outputs[n-1]||'').substring(0,2000):''}</textarea>
        <div class="actions">
          <button class="btn-run" id="btn-run-${n}" onclick="runAgent(${n})">▶ 运行</button>
          <button class="btn-ghost" onclick="clearStep(${n})">清除</button>
          ${a.nextLabel?`<button class="btn-next ${prev?'visible':''}" id="btn-next-${n}" onclick="goNext(${n})">${a.nextLabel} →</button>`:''}
        </div>
        <div class="loading-row" id="loading-${n}">
          <div class="spinner"></div>
          <span id="loading-txt-${n}">正在处理…</span>
        </div>
        <div class="output-wrap ${prev?'visible':''}" id="out-wrap-${n}">
          <div class="output-header">
            <div class="output-dot"></div>
            <span class="output-label-text">输出结果</span>
            <button class="btn-ghost" style="height:26px;padding:0 10px;font-size:11px" onclick="copyOut(${n})">复制</button>
          </div>
          <div class="output-box" id="out-${n}">${prev?renderMd(prev):''}</div>
        </div>
      </div>
    </div>`;
}

function switchStep(n) {
  currentStep = n;
  document.querySelectorAll('.nav-item').forEach(el => {
    const s = parseInt(el.dataset.step);
    el.classList.remove('active');
    el.classList.toggle('done', !!outputs[s] && s !== n);
  });
  document.querySelector(`.nav-item[data-step="${n}"]`).classList.add('active');
  for (let i=1;i<=5;i++) {
    const seg=document.getElementById(`seg-${i}`);
    seg.className='p-seg'+(outputs[i]&&i!==n?' done':i===n?' active':'');
  }
  const a=AGENTS[n-1];
  document.getElementById('topbar-title').textContent=`Agent 0${n} — ${a.tag.split('· ')[1]}`;
  document.getElementById('topbar-sub').textContent=a.title;
  renderStep(n);
}

async function runAgent(n) {
  const key=document.getElementById('apikey').value.trim();
  if(!key){toast('请先填写 API Key');return;}
  const input=document.getElementById(`ta-${n}`).value.trim();
  if(!input){toast('请先填写输入内容');return;}
  const model=document.getElementById('model').value;
  const agent=AGENTS[n-1];
  document.getElementById(`btn-run-${n}`).disabled=true;
  document.getElementById(`loading-${n}`).classList.add('visible');
  document.getElementById(`out-wrap-${n}`).classList.remove('visible');
  const msgs=['正在分析输入内容…','整理结构中…','生成结果中…','即将完成…'];
  let mi=0;
  const timer=setInterval(()=>{const el=document.getElementById(`loading-txt-${n}`);if(el)el.textContent=msgs[mi++%msgs.length];},2000);
  try {
    const resp=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body:JSON.stringify({model,max_tokens:2000,messages:[{role:'system',content:agent.system},{role:'user',content:input}]})
    });
    const data=await resp.json();
    if(!resp.ok) throw new Error(data.error?.message||`HTTP ${resp.status}`);
    const text=data.choices?.[0]?.message?.content||'（无输出）';
    outputs[n]=text;
    document.getElementById(`out-wrap-${n}`).classList.add('visible');
    document.getElementById(`out-${n}`).innerHTML=renderMd(text);
    document.getElementById(`btn-next-${n}`)?.classList.add('visible');
    document.querySelector(`.nav-item[data-step="${n}"]`).classList.add('done');
    document.getElementById(`seg-${n}`).className='p-seg done';
    toast('✓ 完成');
  } catch(e) {
    document.getElementById(`out-wrap-${n}`).classList.add('visible');
    document.getElementById(`out-${n}`).innerHTML=`<span style="color:var(--red)">错误：${e.message}</span>`;
    toast('请求失败：'+e.message);
  } finally {
    clearInterval(timer);
    document.getElementById(`loading-${n}`).classList.remove('visible');
    const btn=document.getElementById(`btn-run-${n}`);
    if(btn) btn.disabled=false;
  }
}

function goNext(n) { switchStep(n+1); }
function clearStep(n) {
  document.getElementById(`ta-${n}`).value='';
  document.getElementById(`out-wrap-${n}`).classList.remove('visible');
  document.getElementById(`btn-next-${n}`)?.classList.remove('visible');
  delete outputs[n];
}
function loadSample(n) { document.getElementById(`ta-${n}`).value=SAMPLES[n]||''; }
function copyOut(n) { navigator.clipboard.writeText(outputs[n]||'').then(()=>toast('已复制到剪贴板')); }

async function runAll() {
  const btn=document.getElementById('run-all-btn');
  btn.textContent='⏳ 运行中…'; btn.disabled=true;
  for(let i=1;i<=5;i++){
    switchStep(i);
    if(!document.getElementById(`ta-${i}`).value.trim()) loadSample(i);
    await runAgent(i);
    await new Promise(r=>setTimeout(r,600));
  }
  btn.textContent='✅ 全流程完成';
  setTimeout(()=>{btn.textContent='▶ 一键运行全流程';btn.disabled=false;},3000);
}

function renderMd(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^\| (.+)$/gm,(_,row)=>{
      const cells=row.split('|').map(c=>c.trim());
      if(cells.every(c=>/^[-:]+$/.test(c)))return'';
      return'<tr>'+cells.map(c=>`<td>${c}</td>`).join('')+'</tr>';
    })
    .replace(/(<tr>[\s\S]*?<\/tr>\n?)+/g,m=>`<table>${m}</table>`)
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
    .replace(/^---$/gm,'<hr>')
    .replace(/\n{2,}/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
